name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run release check
        run: make release-check

  publish-crates:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          package="confluence-cli-v${version}-${{ matrix.target }}"
          mkdir -p "dist/${package}"
          cp "target/${{ matrix.target }}/release/confluence-cli" "dist/${package}/"
          cp README.md CHANGELOG.md LICENSE "dist/${package}/"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          shasum -a 256 "dist/${package}.tar.gz" > "dist/${package}.tar.gz.sha256"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

  publish:
    needs:
      - build
      - publish-crates
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.tar.gz.sha256

  update-homebrew:
    needs: publish
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Check for tap token
        id: check-token
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP_TOKEN not set, skipping Homebrew formula update"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release artifacts
        if: steps.check-token.outputs.skip == 'false'
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Compute release checksums
        if: steps.check-token.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail

          checksum() {
            awk '{print $1}' "$1"
          }

          version="${GITHUB_REF_NAME#v}"
          echo "SHA_MACOS_ARM64=$(checksum "dist/aarch64-apple-darwin/confluence-cli-v${version}-aarch64-apple-darwin.tar.gz.sha256")" >> "$GITHUB_ENV"
          echo "SHA_MACOS_X86=$(checksum "dist/x86_64-apple-darwin/confluence-cli-v${version}-x86_64-apple-darwin.tar.gz.sha256")" >> "$GITHUB_ENV"
          echo "SHA_LINUX_X86=$(checksum "dist/x86_64-unknown-linux-gnu/confluence-cli-v${version}-x86_64-unknown-linux-gnu.tar.gz.sha256")" >> "$GITHUB_ENV"

      - name: Update Homebrew formula
        if: steps.check-token.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/rvben/homebrew-tap.git" homebrew-tap
          cd homebrew-tap

          cat > Formula/confluence-cli.rb << 'FORMULA'
          class ConfluenceCli < Formula
            desc "Markdown-sync-first Confluence CLI in Rust"
            homepage "https://github.com/rvben/confluence-cli"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/rvben/confluence-cli/releases/download/vVERSION_PLACEHOLDER/confluence-cli-vVERSION_PLACEHOLDER-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_MACOS_ARM64_PLACEHOLDER"
              else
                url "https://github.com/rvben/confluence-cli/releases/download/vVERSION_PLACEHOLDER/confluence-cli-vVERSION_PLACEHOLDER-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_MACOS_X86_PLACEHOLDER"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/rvben/confluence-cli/releases/download/vVERSION_PLACEHOLDER/confluence-cli-vVERSION_PLACEHOLDER-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_LINUX_X86_PLACEHOLDER"
              else
                odie "Linux ARM is not supported by this formula."
              end
            end

            def install
              bin.install "confluence-cli"
            end

            test do
              assert_match "confluence-cli #{version}", shell_output("#{bin}/confluence-cli --version")
            end
          end
          FORMULA

          sed -i 's/^          //' Formula/confluence-cli.rb
          sed -i "s/VERSION_PLACEHOLDER/${version}/" Formula/confluence-cli.rb
          sed -i "s/SHA_MACOS_ARM64_PLACEHOLDER/${SHA_MACOS_ARM64}/" Formula/confluence-cli.rb
          sed -i "s/SHA_MACOS_X86_PLACEHOLDER/${SHA_MACOS_X86}/" Formula/confluence-cli.rb
          sed -i "s/SHA_LINUX_X86_PLACEHOLDER/${SHA_LINUX_X86}/" Formula/confluence-cli.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/confluence-cli.rb
          git diff --cached --quiet || git commit -m "Update confluence-cli to ${version}"
          git push
